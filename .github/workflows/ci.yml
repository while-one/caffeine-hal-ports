name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-format:
    name: Lint Format (Clang-Format)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Check Formatting
      run: ./caffeine-build/scripts/build.sh linux-native caffeine-hal-ports-format -DFORMAT_DRY_RUN=ON

  static-analysis:
    name: Static Analysis (Cppcheck & Clang-Tidy)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Run Analysis
      run: ./caffeine-build/scripts/build.sh linux-native caffeine-hal-ports-analyze

  static-analysis-stm32f417:
    name: Static Analysis (STM32F417)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Run Analysis
      run: ./caffeine-build/scripts/build.sh stm32f417vg-release caffeine-hal-ports-analyze

  build-stm32f417:
    name: Cross-Build (STM32F417)
    runs-on: ubuntu-24.04
    needs: [lint-format]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Build Library
      run: ./caffeine-build/scripts/build.sh stm32f417vg-release caffeine-hal-ports

  build-and-test:
    name: Native Build & Mock Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint-format]
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Run Unit Tests (CTest)
      run: ./caffeine-build/scripts/build.sh tests-native-ports all

    - name: Run Coverage
      run: ./caffeine-build/scripts/build.sh tests-native-ports caffeine-hal-ports-coverage

    - name: PR Comment with Coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('build/tests-native-ports/coverage.txt', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '### Code Coverage Report 📊\n```\n' + coverage + '\n```'
          })

  template-compliance:
    name: Template Interface Compliance Build
    runs-on: ubuntu-24.04
    needs: [lint-format]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Build Template Check
      run: ./caffeine-build/scripts/build.sh template-compliance

name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-format:
    name: Lint Format (Clang-Format)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-hal/build-native:latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake (Dry Run Format)
      run: cmake --preset linux-native -D FORMAT_DRY_RUN=ON -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Check Formatting
      run: cmake --build build/linux-native --target caffeine-hal-ports-format

  static-analysis:
    name: Static Analysis (Cppcheck & Clang-Tidy)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-hal/build-native:latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake
      run: cmake --preset linux-native -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Run Analysis
      run: cmake --build build/linux-native --target caffeine-hal-ports-analyze

  build-and-test:
    name: Native Build & Mock Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint-format]
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-hal/build-native:latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install gcovr
      run: apt-get update && apt-get install -y gcovr

    - name: Configure CMake (Host Mock Tests)
      run: cmake --preset tests-native -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Build Tests
      run: cmake --build build/tests-native

    - name: Run Unit Tests (CTest)
      working-directory: build/tests-native
      run: ctest --output-on-failure -j 4

    - name: Run Coverage
      run: cmake --build build/tests-native --target caffeine-hal-ports-coverage

    - name: PR Comment with Coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('build/tests-native/coverage.txt', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '### Code Coverage Report 📊\n```\n' + coverage + '\n```'
          })

  template-compliance:
    name: Template Interface Compliance Build
    runs-on: ubuntu-24.04
    needs: [lint-format]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-hal/build-native:latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake (Template Compliance)
      run: cmake --preset template-compliance -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Build Template Check
      run: cmake --build build/template-compliance
